<h1>Pretty Pictures!</h1>
<button routerLink="/contact">Contact</button>
<section>
    @for(item of posts; track item.name){
    <h2>{{item.name}}</h2>
    <img style="width: 350px;" [src]="item.img">

    <p>Likes:{{item.likes}}</p>
    <button class="button-img" (click)="switchLike($index)">
        <img [src]="item.isLiked ? heartFilled : heartOutline" alt="heart">
    </button>

    }
</section>
